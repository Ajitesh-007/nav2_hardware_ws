; PlatformIO Configuration for ESP32 Rover Firmware
; 
; To build & flash:
;   cd ~/nav2_hardware_ws/src/my_robot_hardware/esp32_firmware
;   pio run -t upload
;
; To monitor serial output:
;   pio device monitor -b 115200

[platformio]
src_dir = rover_firmware

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Serial port — change to match your system
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
