ekf_local:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. Wheel Odometry (from diff_drive_controller)
    # We only trust its X velocity and Yaw velocity
    odom0: /diff_drive_controller/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    
    # 2. ZED2i IMU
    # We trust Yaw velocity and X/Y linear acceleration
    imu0: /zed/zed_node/imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]

navsat_transform:
  ros__parameters:
    use_sim_time: false
    magnetic_declination_radians: 0.0 # Set based on your geographical location
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: true
